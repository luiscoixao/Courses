<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marché - Liste de Courses Partagée</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Icônes pour iPhone et navigateurs -->
    <link rel="icon" type="image/png" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663424594289/8Y3DyzRHjgbTr6JxUFQrfB/icon-aLQDX2AZyPKmo3uxbZG7B6.webp" sizes="192x192">
    <link rel="apple-touch-icon" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663424594289/8Y3DyzRHjgbTr6JxUFQrfB/icon-FhWacwhMKJbDsrzRGpbsyT.png">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Marché">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <div class="navbar">
            <h1>🛒 Marché</h1>
            <div class="navbar-buttons">
                <button id="shareBtn" class="btn-icon" title="Partager la liste">📤</button>
                <button id="navToggle" class="btn-nav">
                    <span id="navLabel">Historique</span>
                </button>
            </div>
        </div>

        <!-- Mode Partage -->
        <div id="shareModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Partager la liste</h2>
                    <button class="close-btn" onclick="closeShareModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="share-section">
                        <h3>Code de partage</h3>
                        <p>Partagez ce code avec d'autres pour qu'ils accèdent à votre liste :</p>
                        <div class="share-code-container">
                            <input type="text" id="shareCode" class="share-code" readonly>
                            <button class="btn-copy" onclick="copyShareCode()">Copier</button>
                        </div>
                    </div>
                    <div class="share-section">
                        <h3>Rejoindre une liste</h3>
                        <p>Entrez le code d'une liste partagée :</p>
                        <div class="share-code-container">
                            <input type="text" id="joinCode" class="share-code" placeholder="Entrez le code...">
                            <button class="btn-join" onclick="joinSharedList()">Rejoindre</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Écran principal -->
        <div id="mainScreen" class="screen">
            <!-- Barre de progression -->
            <div class="progress-section">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p id="progressText" class="progress-text">0/0 articles</p>
            </div>

            <!-- Filtres par catégorie -->
            <div class="filter-section">
                <div class="filter-chips" id="filterChips"></div>
            </div>

            <!-- Liste des articles -->
            <div class="items-section">
                <div id="itemsList" class="items-list"></div>
                <div id="emptyState" class="empty-state">
                    <p>Aucun article pour cette catégorie</p>
                </div>
            </div>

            <!-- Bouton ajouter -->
            <button id="addBtn" class="btn-add">+</button>
        </div>

        <!-- Écran Historique -->
        <div id="historyScreen" class="screen hidden">
            <div class="history-section">
                <div id="historyList" class="items-list"></div>
                <div id="emptyHistory" class="empty-state">
                    <p>Aucun article validé</p>
                </div>
            </div>
            <button id="clearHistoryBtn" class="btn-danger">Vider l'historique</button>
        </div>
    </div>

    <!-- Modal d'ajout -->
    <div id="addModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ajouter un article</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="itemName" placeholder="Nom de l'article" class="input-field">
                <div class="input-row">
                    <input type="number" id="itemQuantity" placeholder="Quantité" value="1" min="1" class="input-field">
                    <select id="itemCategory" class="input-field">
                        <option value="Fruits & Légumes">🥦 Fruits & Légumes</option>
                        <option value="Viandes & Poissons">🥩 Viandes & Poissons</option>
                        <option value="Produits laitiers">🧀 Produits laitiers</option>
                        <option value="Boulangerie">🍞 Boulangerie</option>
                        <option value="Boissons">🥤 Boissons</option>
                        <option value="Épicerie">🥫 Épicerie</option>
                        <option value="Surgelés">❄️ Surgelés</option>
                        <option value="Hygiène">🧼 Hygiène</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Annuler</button>
                <button class="btn-primary" onclick="addItem()">Ajouter</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <!-- App Script -->
    <script src="app-firebase.js"></script>
</body>
</html>
